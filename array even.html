<html>
	<head>
		<title></title>
	</head>
	<body>
		<script>
			document.write("ODD NUMBERS"+"<br>")
			a=[1,2,3,4,5,6,7]
			for (i=0;i<a[i];i+=2)
			{
			document.write(a[i]+"<br>")
			}
			
			document.write("ODD NUMBERS"+"<br>")
			a=[1,2,3,4,5,6,7]
			for (i=1;i<a[i];i+=2)
			{
			document.write(a[i]+"<br>")
			}
			
			document.write("SUM OF ARRAY"+"<br>")
			a=[1,2,3,4,5,6,7,100]
			sum=0
			for (i=0;i<a[i];i++)
			{
			sum+=a[i]
			}
			document.write(sum+"<br>")
			
			
		</script>
	</body>
</html>
