<html>
	<head>
	<title>positive or negative</title>
	</head>
	<body>
	<center><br><br><br>
	<h1>positive or negative numbers</h1><hr>
		<script>
			a=Number(prompt("Enter a number :"))
			document.write(a+"<br>")
			if (a>0)
			{
			document.write("This is a postive number")
			}
			else
			{
			document.write("This is a negative number")
			}
		</script>
		</center>
	</body>
</html>
