<html>
	<head>
		<title>swap two numbers</title>
	</head>
	<body>
		<script>
			a=Number(prompt("Enter the Number is A :"))
			b=Number(prompt("Enter the Number is B :"))
			document.write("AFTER SWAPING"+"<br>")
			temp=a
			a=b
			b=temp
			document.write("A="+a+"<br>")
			document.write("B="+b)
		</script>
	</body>
</html>
