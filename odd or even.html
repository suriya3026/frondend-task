<html>
	<head>
	<title>odd or even</title>
	</head>
	<body>
		<script>
			a=Number(prompt("Enter a number :"))
			document.write(a+"<br>")
			if (a%2==0)
			{
			document.write("This is even number")
			}
			else
			{
			document.write("This is odd number")
			}
			
		</script>
	</body>
</html>
