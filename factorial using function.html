<html>
	<head>
		<title>factorial function</title>
	</head>
	<body>
		<script>
			function factorial()
			{
				a=Number(prompt("Enter the number :"))
				fact=1
				for(i=1;i<=a;i++)
				{
				fact=fact*i
				}
				return fact
			}
			document.write("The factorial number is :"+factorial())
		</script>
	</body>
</html>
