<html>
	<head>
	<title>mark list</title>
	</head>
	<body>
		<script>
			a=Number(prompt("Enter a mark :"))
			document.write(a+"<br>")
			if (a>=0 && a<=40)
			{
			document.write("Grade F")
			}
			else if ((a>=41)&&(a<=60))
			{
			document.write("Grade B")
			}
			else if ((a>=61)&&(a<=80))
			{
			document.write("Grade B+")
			}
			else if ((a>=81)&&(a<=90))
			{
			document.write("Grade A")
			}
			else if ((a>=91)&&(a<=100))
			{
			document.write("Grade A")
			}
			else
			{
			document.write("Invalid")
			}
		</script>
	</body>
</html>
