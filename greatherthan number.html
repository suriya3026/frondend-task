<html>
	<head>
		<title>greatherthan number</title>
	</head>
	<body>
		<script src="odd or even.js"defer>
			a=Number(prompt("Enter the number A :"))
			document.write(a+"<br>")
			
			b=Number(prompt("Enter the number B :"))
			document.write(b+"<br>")
			
			c=Number(prompt("Enter the number C :"))
			document.write(c+"<br>")
			

			
			if ((a>=b)&&(a>=c))
			{
			document.write("The greatest number is a : ",a)
			}
			else if ((b>=a)&&(b>=c))
			{
			document.write("The greatest number is b : ",b)
			}
			else
			{
			document.write("The greatest number is c : ",c)
			}
			
		</script>
	</body>
</html>
